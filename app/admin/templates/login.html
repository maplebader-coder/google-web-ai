<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Google AI Proxy 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 16px; padding: 48px 40px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .login-card p { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: border-color 0.3s; outline: none; }
        .form-group input:focus { border-color: #667eea; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.3s; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 13px; text-align: center; margin-top: 16px; display: none; }
        .logo { text-align: center; margin-bottom: 20px; font-size: 40px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🤖</div>
        <h1>Google AI Proxy</h1>
        <p>管理控制台</p>
        <form id="loginForm" onsubmit="return doLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="loginBtn">登 录</button>
            <div class="error" id="errorMsg"></div>
        </form>
    </div>
    <script>
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            btn.disabled = true;
            errEl.style.display = 'none';
            try {
                const resp = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    })
                });
                if (resp.ok) {
                    window.location.href = '/admin/';
                } else {
                    const data = await resp.json();
                    errEl.textContent = data.detail || '登录失败';
                    errEl.style.display = 'block';
                }
            } catch(err) {
                errEl.textContent = '网络错误';
                errEl.style.display = 'block';
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
